# TEMPORARY diagnostic workflow — probes whether the saml-to assumed role can
# CreateBucket via the canonical AWS CLI (with --debug so we see the exact
# signed request). Isolates "infra/role/region problem" from "our SigV4 is
# wrong". Delete this file once the reflect-aws leg is understood.
name: aws-probe

on:
  workflow_dispatch: {}
  # TEMP: also run on push to the debugging branch (workflow_dispatch alone
  # isn't dispatchable until the file lands on the default branch). Remove with
  # the rest of this file.
  push:
    branches: [ci/etcd-e2e-reflect-aws]

permissions:
  contents: read
  id-token: write

jobs:
  probe:
    runs-on: ubuntu-24.04
    steps:
      - name: assume AWS role
        uses: saml-to/assume-aws-role-action@b7d7ce65384c7d07463e2313b71ccf8b35a147e0 # v1
        with:
          role: ${{ vars.AWS_ROLE_ARN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: identity + region
        run: |
          set -x
          aws sts get-caller-identity
          echo "AWS_REGION=${AWS_REGION:-<unset>}"
          echo "AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-<unset>}"
          echo "have session token: $([ -n "${AWS_SESSION_TOKEN:-}" ] && echo yes || echo no)"

      - name: create-bucket via aws cli (verbose)
        run: |
          set -x
          account=$(cut -d: -f5 <<< "${{ vars.AWS_ROLE_ARN }}")
          bucket="libraft-e2e-${account}"
          region="${AWS_DEFAULT_REGION:-us-east-1}"
          echo "probing create of s3://${bucket} in ${region}"
          # us-east-1 must NOT carry a LocationConstraint; other regions must.
          if [ "$region" = "us-east-1" ]; then
            aws s3api create-bucket --bucket "$bucket" --region "$region" --debug 2>&1 | tail -80
          else
            aws s3api create-bucket --bucket "$bucket" --region "$region" \
              --create-bucket-configuration "LocationConstraint=$region" --debug 2>&1 | tail -80
          fi
          echo "=== head-bucket ==="
          aws s3api head-bucket --bucket "$bucket" && echo "HEAD ok (bucket usable)"

      - name: leave bucket in place
        # Intentionally NOT deleting: a persistent bucket is what the reflect-aws
        # leg wants (its ensureBucket then hits 409 -> tolerated). If the CLI
        # created it here, the real leg should stop 403-ing.
        run: echo "bucket left for the reflect-aws leg to reuse"
