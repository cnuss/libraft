name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    # Defaults are [opened, synchronize, reopened]. Add ready_for_review
    # so a draft -> ready transition re-runs CI without an empty push;
    # keep synchronize explicit so every new commit on the PR triggers a
    # fresh run.
    types: [opened, synchronize, reopened, ready_for_review]
  # Manual runs exist for the etcd-e2e job (e.g. re-mapping the full etcd
  # suite); the regular ci matrix simply runs alongside.
  workflow_dispatch:
    inputs:
      e2e-full:
        description: >-
          Run the FULL etcd e2e suite (clears E2E_SUBSET; the reflect leg goes
          red on the documented-unsupported tests — see LIMITATIONS.md)
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # x64 + arm64 across linux, windows, and macos, all pinned to discrete
        # image labels (no *-latest aliases) so every cell names an explicit
        # version — the GitHub-hosted ARM runners (free for public repos) only
        # exist as discrete labels, so pinning the rest keeps the matrix
        # consistent. macos-26-intel is x64 (Intel), macos-26 is arm64 (Apple
        # Silicon). Bumping an image label renames its check context, so update
        # the branch-protection required contexts when bumping. gofmt runs
        # Linux-only (see below), covering both Linux cells.
        os:
          - ubuntu-24.04
          - windows-2025
          - ubuntu-24.04-arm
          - windows-11-arm
          - macos-26-intel
          - macos-26
        # "min" reads the floor from go.mod (the `go X.Y` directive); "stable"
        # is whatever setup-go's `stable` alias resolves to. Keeping "min"
        # symbolic avoids drift between go.mod and the workflow when the floor
        # is bumped.
        go: [min, stable]
    defaults:
      run:
        # bash on Windows runners comes from git-for-windows (MSYS) and matches
        # the Linux job's shell semantics, so steps below don't need per-OS
        # branching for $(...) / [ -n ... ] / piping.
        shell: bash
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: resolve go version
        id: goversion
        # "min" → the `go X.Y` directive in go.mod (the declared floor).
        # Anything else (e.g. "stable") passes through unchanged so setup-go's
        # aliases keep working.
        run: |
          if [ "${{ matrix.go }}" = "min" ]; then
            v=$(awk '/^go [0-9]/ {print $2; exit}' go.mod)
            echo "version=$v" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ matrix.go }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ steps.goversion.outputs.version }}
          cache: true

      - name: gofmt
        # Linux-only: actions/checkout on Windows normalizes line endings to
        # CRLF, which gofmt flags on every file. The Linux cells already
        # enforce gofmt on the canonical LF tree.
        if: runner.os == 'Linux'
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi

      # The make targets export CGO_ENABLED=0 (see Makefile) — the library is
      # pure Go, and windows-11-arm runners ship an x86_64 gcc that can't
      # assemble runtime/cgo's arm64 stubs.
      - name: go vet
        run: make vet

      - name: go build
        run: make build

      - name: tests
        run: make test

      - name: e2e
        run: make e2e

  # ---------------------------------------------------------------------------
  # etcd-e2e: runs a subset of etcd's OWN e2e suite against two binaries and
  # compares:
  #
  #   baseline    — stock etcd (built from the pinned etcd checkout), no hijack.
  #   reflect     — stock etcd + the libraft installer blank-imported
  #                 (e2e/main.go), ETCD_S3LOG_URL pointed at a MinIO container.
  #   reflect-aws — the same hijacked binary against REAL AWS S3: credentials
  #                 come from saml-to/assume-aws-role-action (exports AWS_* env
  #                 for the rest of the job) using the AWS_ROLE_ARN repo
  #                 variable. Runs a per-run prefix in a per-account bucket and
  #                 purges it afterwards. Only scheduled into the matrix when
  #                 the role variable exists and the run isn't a fork PR (forks
  #                 get neither vars nor a token saml.to trusts) — see the
  #                 modes output of the changes job.
  #
  # The hijacked binary is stock etcd with one blank import (etcdmain.Main is
  # exported), built from the isolated e2e module so etcdmain's deps never
  # touch the root go.mod. etcd's e2e framework resolves the server binary
  # from <etcd>/bin/etcd, so the reflect leg just overwrites that one file.
  #
  # A test failure fails the step (pipefail + no continue-on-error). Both legs
  # run the E2E_SUBSET below — the slice of etcd's own suite libraft is known to
  # pass (single-node + a real multi-member cluster), so both gate green.
  # libraft documents whole classes of e2e as unsupported (leader transfer,
  # simultaneous discovery bootstrap, periodic corruption check, force-new);
  # those are excluded from the subset and only run when E2E_SUBSET is cleared
  # via the e2e-full input on a manual workflow_dispatch run. Baseline proves
  # the harness itself works; the baseline-vs-reflect diff is the map of what
  # libraft supports (issue #20).
  #
  # This used to be its own workflow gated by on.<event>.paths; folded in here
  # that filter would gate ALL of CI, so the path gate moved into the changes
  # job below. The job's check contexts ("etcd-e2e (baseline)" etc.) are not
  # in the branch-protection required list — only the ci matrix cells are.
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-24.04
    outputs:
      etcd-e2e: ${{ steps.filter.outputs.run }}
      modes: ${{ steps.modes.outputs.modes }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: path filter
        id: filter
        # Same paths the standalone workflow used, with tests/e2e-etcd/**
        # replaced by e2e/** and the workflow file now being ci.yml.
        run: |
          set -euo pipefail
          run=false
          case "${{ github.event_name }}" in
            workflow_dispatch) run=true ;;
            pull_request) base="${{ github.event.pull_request.base.sha }}" ;;
            push) base="${{ github.event.before }}" ;;
          esac
          if [ "$run" != "true" ]; then
            # No usable before-sha (new branch, force-push history rewrite):
            # fail open and run.
            if [ -z "${base:-}" ] || ! git cat-file -e "$base" 2>/dev/null; then
              run=true
            elif git diff --name-only "$base" "${{ github.sha }}" \
                | grep -qE '^(v3/|e2e/|\.github/workflows/ci\.yml)'; then
              run=true
            fi
          fi
          echo "run=$run" >> "$GITHUB_OUTPUT"
          echo "etcd-e2e gate: run=$run"

      - name: e2e modes
        id: modes
        # matrix can't be conditioned per-cell with a job-level if, so the
        # mode list itself is computed here. reflect-aws joins only when the
        # AWS_ROLE_ARN variable exists and the run isn't a fork PR: forks see
        # neither repo variables nor a GITHUB_TOKEN that saml.to's trust
        # accepts, so the leg could only fail there.
        run: |
          set -euo pipefail
          modes='["baseline","reflect"]'
          if [ -n "${{ vars.AWS_ROLE_ARN }}" ] && \
             { [ "${{ github.event_name }}" != "pull_request" ] || \
               [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; }; then
            modes='["baseline","reflect","reflect-aws"]'
          fi
          echo "modes=$modes" >> "$GITHUB_OUTPUT"
          echo "etcd-e2e modes: $modes"

  etcd-e2e:
    needs: changes
    # Tag pushes release; they never need the etcd suite.
    if: needs.changes.outputs.etcd-e2e == 'true' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    env:
      # etcd release the hijack + this harness are pinned to (must match the
      # go.etcd.io/etcd/server/v3 version in go.mod / e2e/go.mod).
      ETCD_REF: v3.7.0
      # Both PRs and main run the SAME fast, high-value subset of etcd's OWN
      # suite that libraft is known to pass (confirmed against the full run in
      # issue #20) — enough to prove a CLUSTER stays functional through the S3
      # log, not just a single node:
      #   single-node functional: KV, txn, lease, watch, compaction, auth, elect, lock
      #   multi-member:           multi-peer bring-up, member add/list/update/promote,
      #                           learners, linearizable + consistent reads,
      #                           runtime grow/shrink of the cluster
      # Deliberately EXCLUDED (red-by-design under the hijack, per
      # LIMITATIONS.md): leader transfer, simultaneous discovery bootstrap,
      # network-partition health, the periodic corruption check, rolling
      # upgrade. To re-map the full surface, run workflow_dispatch with the
      # e2e-full input set.
      # Regex must be shell-safe (no spaces or parens; spliced unquoted into
      # -run).
      # NOTE: TestRuntimeReconfig is listed as the two passing variants
      # explicitly because bare `TestRuntimeReconfig` would also match
      # RollingUpgrade (fails).
      E2E_SUBSET: "TestCtlV3Put|TestCtlV3Get|TestCtlV3Del|TestCtlV3Txn|TestCtlV3Lease|TestCtlV3Watch|TestCtlV3Compact|TestCtlV3Auth|TestCtlV3Elect|TestCtlV3Lock|TestCtlV3Member|TestCtlV3LinearizableRead|TestCtlV3ConsistentMemberList|TestEtcdMultiPeer|TestRuntimeReconfigGrowClusterSize|TestRuntimeReconfigDecreaseClusterSize"
    strategy:
      fail-fast: false
      matrix:
        mode: ${{ fromJSON(needs.changes.outputs.modes) }}
    steps:
      - name: checkout libraft
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: libraft

      - name: checkout etcd ${{ env.ETCD_REF }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: etcd-io/etcd
          ref: ${{ env.ETCD_REF }}
          path: etcd

      - name: setup go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: etcd/go.mod

      - name: build stock etcd binaries
        working-directory: etcd
        run: |
          make build
          ls -l bin/
          ./bin/etcd --version

      - name: build hijacked etcd (reflect modes)
        if: matrix.mode != 'baseline'
        working-directory: libraft/e2e
        run: |
          # Overwrite ONLY the server binary; etcdctl/etcdutl stay stock.
          CGO_ENABLED=0 go build -o "$GITHUB_WORKSPACE/etcd/bin/etcd" .
          "$GITHUB_WORKSPACE/etcd/bin/etcd" --version

      # From here the store env (ETCD_S3LOG_URL + credentials) is exported to
      # GITHUB_ENV per mode, so the run step needs no per-mode env plumbing:
      # baseline exports nothing (installer no-ops), reflect exports the MinIO
      # endpoint + static creds, reflect-aws gets AWS_* from the assume-role
      # action and exports a composed real-S3 URL.
      - name: start MinIO (reflect only)
        if: matrix.mode == 'reflect'
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          # Wait for readiness.
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:9000/minio/health/live; then echo ready; break; fi
            sleep 1
          done
          {
            echo "ETCD_S3LOG_URL=http://127.0.0.1:9000/etcd-e2e"
            echo "AWS_ACCESS_KEY_ID=minioadmin"
            echo "AWS_SECRET_ACCESS_KEY=minioadmin"
          } >> "$GITHUB_ENV"

      - name: assume AWS role (reflect-aws only)
        if: matrix.mode == 'reflect-aws'
        uses: saml-to/assume-aws-role-action@b7d7ce65384c7d07463e2313b71ccf8b35a147e0 # v1
        with:
          role: ${{ vars.AWS_ROLE_ARN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: resolve S3 URL (reflect-aws only)
        if: matrix.mode == 'reflect-aws'
        id: s3url
        # Bucket is per-account (names are globally unique; the client's
        # ensureBucket creates it on first use). The prefix is per-run so runs
        # never see each other's log/HEAD state in the persistent bucket; the
        # purge step below removes it again.
        run: |
          set -euo pipefail
          account=$(cut -d: -f5 <<< "${{ vars.AWS_ROLE_ARN }}")
          bucket="libraft-e2e-${account}"
          prefix="run-${{ github.run_id }}-${{ github.run_attempt }}"
          url="https://s3.${AWS_DEFAULT_REGION}.amazonaws.com/${bucket}/${prefix}"
          echo "bucket=$bucket" >> "$GITHUB_OUTPUT"
          echo "prefix=$prefix" >> "$GITHUB_OUTPUT"
          echo "ETCD_S3LOG_URL=$url" >> "$GITHUB_ENV"
          echo "store: $url"
          # etcd's e2e framework forwards ONLY ETCD_/ETCDCTL_/EXPECT_/PATH env
          # to the spawned server (tests/framework/e2e/util.go
          # mergeEnvVariables), so AWS_* from the assume-role step never reach
          # the hijacked binary — it would fall back to the minioadmin default
          # and get InvalidAccessKeyId. Re-export the temporary creds under
          # ETCD_S3LOG_* names, which the client reads first (client.go) and the
          # framework does forward. (saml.to's STS tokens carry no '=', so that
          # helper's naive '='-split doesn't truncate them.)
          {
            echo "ETCD_S3LOG_ACCESS_KEY=${AWS_ACCESS_KEY_ID}"
            echo "ETCD_S3LOG_SECRET_KEY=${AWS_SECRET_ACCESS_KEY}"
            echo "ETCD_S3LOG_SESSION_TOKEN=${AWS_SESSION_TOKEN}"
            echo "ETCD_S3LOG_REGION=${AWS_DEFAULT_REGION}"
          } >> "$GITHUB_ENV"

      # Isolate hijack startup from the e2e framework: run the hijacked binary
      # standalone with minimal single-node args and capture its FULL output.
      # Also dump the addresses of the patch target and the patcher — if they
      # land on the same page the monkey-patch SIGBUSes (the hazard that got the
      # newRaftNode seam reverted once; this full etcd binary is where it bit).
      - name: smoke — hijacked etcd standalone (reflect only)
        if: matrix.mode == 'reflect'
        continue-on-error: true
        env:
          ETCD_S3LOG_URL: http://127.0.0.1:9000/etcd-smoke
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
        run: |
          echo "== symbol gap (same-page SIGBUS hazard) =="
          go tool nm "$GITHUB_WORKSPACE/etcd/bin/etcd" \
            | grep -E 'bootstrappedRaft\)\.newRaftNode$|reflect\.writeText$|v3\.NewRaftNode$' || echo "(symbols not found)"
          echo "== launch standalone =="
          D=$(mktemp -d)
          "$GITHUB_WORKSPACE/etcd/bin/etcd" --data-dir "$D" --name smoke \
            --listen-client-urls http://127.0.0.1:23790 --advertise-client-urls http://127.0.0.1:23790 \
            --listen-peer-urls http://127.0.0.1:23791 --initial-advertise-peer-urls http://127.0.0.1:23791 \
            --initial-cluster smoke=http://127.0.0.1:23791 --initial-cluster-state new \
            > "$GITHUB_WORKSPACE/smoke.log" 2>&1 &
          PID=$!
          for i in $(seq 1 25); do
            if grep -q "ready to serve client requests" "$GITHUB_WORKSPACE/smoke.log"; then echo "READY"; break; fi
            if ! kill -0 $PID 2>/dev/null; then echo "PROCESS EXITED EARLY (code $?)"; break; fi
            sleep 1
          done
          kill $PID 2>/dev/null || true
          echo "== smoke.log (full) =="
          cat "$GITHUB_WORKSPACE/smoke.log"

      - name: run etcd e2e (${{ matrix.mode }})
        id: e2e
        # A test failure fails this step (and the job): pipefail propagates
        # go test's exit code through the tee, and there is no continue-on-error
        # masking it. The default E2E_SUBSET is the known-passing slice, so the
        # gate is green; clearing it (the e2e-full dispatch input) turns the
        # reflect leg red on the ~28 documented-unsupported tests.
        working-directory: etcd/tests
        env:
          # etcd's own scripts/test.sh exports ETCD_VERIFY=all for every e2e
          # run — it turns on the server's internal consistency/hash checks
          # during tests. Match it: baseline then mirrors etcd's real CI, and
          # the reflect leg gets a stronger assertion that libraft doesn't leave
          # bbolt state etcd's verifier would reject.
          ETCD_VERIFY: all
          # ETCD_S3LOG_URL + AWS_* come from GITHUB_ENV, exported per mode by
          # the MinIO / assume-role / resolve steps above; the spawned etcd
          # inherits them, so the installer activates. Baseline exports
          # nothing => the installer no-ops.
        run: |
          set -o pipefail  # without this, tee's exit 0 hides go test's failure
          if [ "${{ inputs.e2e-full }}" = "true" ]; then E2E_SUBSET=""; fi
          RUN=""
          [ -n "${E2E_SUBSET}" ] && RUN="-run ${E2E_SUBSET}"
          echo "mode=${{ matrix.mode }}  scope='${E2E_SUBSET:-<full suite>}'"
          # -p 2 caps concurrent test binaries so parallel multi-node clusters
          # don't exhaust ports/CPU; -timeout bounds a hang under the hijack.
          # (Full serialization killed the watch-delay flake but was far too
          # slow; those fails are etcd's own known-flaky tests regardless.)
          go test ./e2e ${RUN} -count=1 -v -p 2 -timeout 90m 2>&1 \
            | tee "$GITHUB_WORKSPACE/e2e-${{ matrix.mode }}.log"

      - name: summarize
        if: always()
        run: |
          L="$GITHUB_WORKSPACE/e2e-${{ matrix.mode }}.log"
          {
            echo "### etcd-e2e (${{ matrix.mode }}) — step ${{ steps.e2e.outcome }}"
            echo "PASS: $(grep -ac -- '--- PASS' "$L" 2>/dev/null)  FAIL: $(grep -ac -- '--- FAIL' "$L" 2>/dev/null)  SKIP: $(grep -ac -- '--- SKIP' "$L" 2>/dev/null)"
            echo ""
            echo "Failing tests:"
            echo '```'
            grep -aoE '\-\-\- FAIL: [A-Za-z0-9_/]+' "$L" 2>/dev/null | sed 's/^--- FAIL: //' | sort -u || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: upload logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: e2e-${{ matrix.mode }}-logs
          path: |
            e2e-${{ matrix.mode }}.log
            smoke.log
          if-no-files-found: warn

      - name: purge S3 run prefix (reflect-aws only)
        # always(): the bucket persists across runs (unlike the throwaway
        # MinIO container), so the per-run prefix must go even when tests
        # fail. Credentials are the job-scoped assume-role exports; if the
        # role assumption itself failed there's nothing to purge.
        # TEMP DISABLED (#50 debugging): the extra `vars.PURGE_S3_PREFIX` guard
        # keeps the run prefix in the bucket for inspection (the var isn't set).
        # Restore by deleting that clause before merge.
        if: always() && matrix.mode == 'reflect-aws' && steps.s3url.outcome == 'success' && vars.PURGE_S3_PREFIX == 'true'
        run: |
          aws s3 rm --recursive \
            "s3://${{ steps.s3url.outputs.bucket }}/${{ steps.s3url.outputs.prefix }}" || true

  release:
    needs: [ci]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push tag + create release
      id-token: write   # cosign keyless signing via OIDC
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: resolve tag
        id: tag
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            # Manual tag push (minor/major bumps): use the tag as-is.
            echo "tag=${GITHUB_REF_NAME}"      >> "$GITHUB_OUTPUT"
            echo "needs_push=false"            >> "$GITHUB_OUTPUT"
            echo "skip=false"                  >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # main push: skip release if the commit opted out or already has a tag.
          # Token must sit alone on its own line so prose mentioning it inline
          # (subjects, doc paragraphs) doesn't accidentally suppress the release.
          msg=$(git log -1 --pretty=%B)
          if grep -qE '^[[:space:]]*\[skip release\][[:space:]]*$' <<<"$msg"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if git tag --points-at HEAD | grep -q '^v'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi

          # Auto-bump patch from the latest v* tag (default v0.0.1 for first release).
          latest=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$latest" ]; then
            next="v0.0.1"
          else
            IFS=. read -r major minor patch <<<"${latest#v}"
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "tag=${next}"      >> "$GITHUB_OUTPUT"
          echo "needs_push=true"  >> "$GITHUB_OUTPUT"
          echo "skip=false"       >> "$GITHUB_OUTPUT"

      - name: push tag
        if: steps.tag.outputs.skip != 'true' && steps.tag.outputs.needs_push == 'true'
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: create github release
        if: steps.tag.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --generate-notes

      - name: install cosign
        if: steps.tag.outputs.skip != 'true'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: sign source archives
        if: steps.tag.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          repo="${GITHUB_REPOSITORY}"
          mkdir -p dist

          # Pull the auto-generated source archives that GitHub publishes
          # alongside every tag, then sign them with cosign in keyless mode
          # (OIDC -> Fulcio cert -> Rekor transparency log). The signature,
          # cert, and Rekor entry are bundled in a single .sigstore file.
          for ext in tar.gz zip; do
            curl -fsSL "https://github.com/${repo}/archive/refs/tags/${tag}.${ext}" \
              -o "dist/${tag}.${ext}"
            cosign sign-blob --yes \
              --bundle "dist/${tag}.${ext}.sigstore" \
              "dist/${tag}.${ext}"
          done

          gh release upload "${tag}" \
            "dist/${tag}.tar.gz.sigstore" \
            "dist/${tag}.zip.sigstore"

      - name: warm proxy.golang.org
        if: steps.tag.outputs.skip != 'true'
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          mod="github.com/${GITHUB_REPOSITORY}"
          curl -fsSL "https://proxy.golang.org/${mod}/@v/${tag}.info" >/dev/null
          curl -fsSL "https://proxy.golang.org/${mod}/@v/${tag}.mod"  >/dev/null
          curl -fsSL "https://sum.golang.org/lookup/${mod}@${tag}"    >/dev/null
